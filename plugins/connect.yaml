apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: connect
spec:
  version: v0.5.22
  homepage: https://github.com/fidelity/kconnect
  shortDescription: "Discover and access clusters"
  description: |
    kconnect is a tool that can be used to discover and securely access Kubernetes
    clusters across multiple operating environments.
    Based on the authentication mechanism chosen the CLI will discover Kubernetes
    clusters you are allowed to access in a target hosting environment (i.e. EKS, AKS, Rancher)
    and generate a kubeconfig for a chosen cluster.
    Features:
    - Authenticate using SAML or Azure Active Directory
    - Discover EKS, AKS & Rancher clusters
    - Generate a kubeconfig for a cluster
    - Query history of connected servers
    - Regenerate the kubeconfig from your history by using an id or an alias
    - Import defaults values for your company
  caveats: |
    This plugin currently only supports EKS, AKS and Rancher
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/fidelity/kconnect/releases/download/0.5.22/kconnect_linux_amd64.tar.gz
    sha256: 2e3bb23f86867cfea35929c5a86fb46ac8a0c032312eb31cfb85b044ad5403aa
    files:
    - from: "kconnect"
      to: "kubectl-connect"
    - from: "LICENSE"
      to: "."
    bin: kubectl-connect
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/fidelity/kconnect/releases/download/0.5.22/kconnect_linux_arm64.tar.gz
    sha256: 0046af34a1693c2dc612bbd3eee99af370afb6160055ae2bd1847a0bfde770de
    files:
    - from: "kconnect"
      to: "kubectl-connect"
    - from: "LICENSE"
      to: "."
    bin: kubectl-connect
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/fidelity/kconnect/releases/download/0.5.22/kconnect_macos_amd64.tar.gz
    sha256: 4487f5ce7760cee494f8b07d0580b6db5b37e03c5adeee22de9b26f62253054c
    files:
    - from: "kconnect"
      to: "kubectl-connect"
    - from: "LICENSE"
      to: "."
    bin: kubectl-connect
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/fidelity/kconnect/releases/download/0.5.22/kconnect_macos_arm64.tar.gz
    sha256: 04d7bec4ad7fa7d427d2bed9f610104e33937230542bcf70023f8458a26e4d88
    files:
    - from: "kconnect"
      to: "kubectl-connect"
    - from: "LICENSE"
      to: "."
    bin: kubectl-connect
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/fidelity/kconnect/releases/download/0.5.22/kconnect_windows_amd64.zip
    sha256: 41095000d493657f413c874af15ff9e79ef263d496d66cf29d2659c2bf5d9897
    files:
    - from: "kconnect.exe"
      to: "kubectl-connect.exe"
    - from: "LICENSE"
      to: "."
    bin: kubectl-connect.exe
