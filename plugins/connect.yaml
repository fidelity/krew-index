apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: connect
spec:
  version: v0.5.21
  homepage: https://github.com/fidelity/kconnect
  shortDescription: "Discover and access clusters"
  description: |
    kconnect is a tool that can be used to discover and securely access Kubernetes
    clusters across multiple operating environments.
    Based on the authentication mechanism chosen the CLI will discover Kubernetes
    clusters you are allowed to access in a target hosting environment (i.e. EKS, AKS, Rancher)
    and generate a kubeconfig for a chosen cluster.
    Features:
    - Authenticate using SAML or Azure Active Directory
    - Discover EKS, AKS & Rancher clusters
    - Generate a kubeconfig for a cluster
    - Query history of connected servers
    - Regenerate the kubeconfig from your history by using an id or an alias
    - Import defaults values for your company
  caveats: |
    This plugin currently only supports EKS, AKS and Rancher
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/fidelity/kconnect/releases/download/0.5.21/kconnect_linux_amd64.tar.gz
    sha256: 6a76eb6cbc825e14bce4457c093f47401da51c7690e71396cb44726e779bc676
    files:
    - from: "kconnect"
      to: "kubectl-connect"
    - from: "LICENSE"
      to: "."
    bin: kubectl-connect
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/fidelity/kconnect/releases/download/0.5.21/kconnect_linux_arm64.tar.gz
    sha256: 79caf4dfb1d12d95f143dd23c481eee47c59ef36abbb90308c1242fa6a1ba753
    files:
    - from: "kconnect"
      to: "kubectl-connect"
    - from: "LICENSE"
      to: "."
    bin: kubectl-connect
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/fidelity/kconnect/releases/download/0.5.21/kconnect_macos_amd64.tar.gz
    sha256: 01df9fd056298ebf268e707c73d95df17624932c0e15e52af05c9b02f64b1949
    files:
    - from: "kconnect"
      to: "kubectl-connect"
    - from: "LICENSE"
      to: "."
    bin: kubectl-connect
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/fidelity/kconnect/releases/download/0.5.21/kconnect_macos_amd64.tar.gz
    sha256: 01df9fd056298ebf268e707c73d95df17624932c0e15e52af05c9b02f64b1949
    files:
    - from: "kconnect"
      to: "kubectl-connect"
    - from: "LICENSE"
      to: "."
    bin: kubectl-connect
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/fidelity/kconnect/releases/download/0.5.21/kconnect_windows_amd64.zip
    sha256: b1bf6a6d8a3e455c216bd8a77f7ac7ef03067907014b1d780f45550b119b3e8a
    files:
    - from: "kconnect.exe"
      to: "kubectl-connect.exe"
    - from: "LICENSE"
      to: "."
    bin: kubectl-connect.exe
